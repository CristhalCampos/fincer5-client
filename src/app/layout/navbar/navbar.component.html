"/>
    </svg>
    <div class="rubik-title text-2xl font-bold tracking-tight" style="color: var(--text-color);">
      fincer<span class="logo-text-accent" style="color: var(--accent-color);">5</span>
    </div>
  </div>

  <!-- Links de navegación -->
  <div class="flex gap-4 items-center">
    @let linkStyles = "px-2 py-1 text-(--text-color) font-medium transition-all hover:opacity-80";
    @let activeStyles = "text-(--accent-color) border-b-2 border-(--accent-color)";

    <a routerLink="/home"
        routerLinkActive
        #rlaHome="routerLinkActive"
        [class]="linkStyles"
        [class.active-link]="rlaHome.isActive"
        [ngClass]="rlaHome.isActive ? activeStyles : ''">Inicio</a>

    <a routerLink="/about"
        routerLinkActive
        #rlaAbout="routerLinkActive"
        [class]="linkStyles"
        [ngClass]="rlaAbout.isActive ? activeStyles : ''">Nosotros</a>

    <a routerLink="/faq"
        routerLinkActive
        #rlaFaq="routerLinkActive"
        [class]="linkStyles"
        [ngClass]="rlaFaq.isActive ? activeStyles : ''">FAQ</a>

    <a routerLink="/contact"
        routerLinkActive
        #rlaContact="routerLinkActive"
        [class]="linkStyles"
        [ngClass]="rlaContact.isActive ? activeStyles : ''">Contacto</a>
  </div>

  <!-- Acciones -->
  <div class="flex items-center gap-6">
    <!-- Switch de Tema Deslizante -->
    <div class="relative inline-flex items-center cursor-pointer group" (click)="theme.toggleTheme()">
      <!-- Fondo del track -->
      <div
        class="w-14 h-7 rounded-full transition-all duration-300 shadow-inner border"
        style="background-color: var(--switch-bg); border-color: var(--switch-border);">
        <!-- Iconos de fondo -->
        <div class="absolute inset-0 flex justify-between items-center px-2.5 pointer-events-none">
          <lucide-icon [img]="MoonIcon" class="w-3 h-3 text-slate-400/50 dark:text-neutral-500/30"></lucide-icon>
          <lucide-icon [img]="SunIcon" class="w-3 h-3 text-slate-400/30 dark:text-neutral-500/50"></lucide-icon>
        </div>
      </div>

      <!-- Círculo deslizante (Thumb) -->
      <div
        class="absolute left-1 top-1 w-5 h-5 rounded-full transition-all duration-300 flex items-center justify-center shadow-lg"
        [style.background-color]="'var(--switch-thumb)'"
        [class.translate-x-7]="theme.darkMode()">
        <!-- Contenedor interno para asegurar el centrado perfecto del SVG -->
        <div class="flex items-center justify-center w-full h-full">
          @if (theme.darkMode()) {
            <lucide-icon
              [img]="SunIcon"
              class="w-3.5 h-3.5 text-yellow-400 transition-transform scale-110">
            </lucide-icon>
          } @else {
            <lucide-icon
              [img]="MoonIcon"
              class="w-3.5 h-3.5 text-slate-600 transition-transform scale-110">
            </lucide-icon>
          }
        </div>
      </div>
    </div>

    <!-- Botón de Autenticación -->
    <button class="btn-primary">
      Comenzar
    </button>
  </div>
</nav>

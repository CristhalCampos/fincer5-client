<div class="max-w-xl mx-auto py-16 px-6">
  <div class="bg-(--surface-color) p-10 rounded-3xl shadow-2xl border border-(--switch-border)">
    <h2 class="text-2xl font-bold mb-6 text-center">Contáctanos</h2>
    <form class="space-y-4">
      <input type="text" placeholder="Nombre" class="w-full p-3 rounded-lg bg-(--bg-color) border border-(--switch-border) focus:border-(--accent-color) outline-none transition-all">
      <textarea placeholder="Mensaje" rows="4" class="w-full p-3 rounded-lg bg-(--bg-color) border border-(--switch-border) focus:border-(--accent-color) outline-none transition-all"></textarea>
      <button class="btn-primary w-full py-3 mt-4">Enviar Mensaje</button>
    </form>
  </div>
</div>
